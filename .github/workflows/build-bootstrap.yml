name: Build Custom Bootstrap

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name (e.g., com.agentclaw)"
        required: true
        default: "com.agentclaw"
      minimal_bootstrap:
        description: "Minimal bootstrap (exclude large packages)"
        required: false
        type: boolean
        default: false
      ssh_server:
        description: "Bundle SSH server with default password 'changeme'"
        required: false
        type: boolean
        default: false

env:
  ARCHITECTURE: aarch64
  TERMUX_TYPE: f-droid
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FULL_PACKAGES: "git,curl,wget,nano,tmux,htop,jq,ca-certificates,openssl-tool,openssh,screen,pacman,nodejs-lts,python,build-essential,clang,cmake,make,autoconf,automake,libtool,pkg-config,gradle,openjdk-17,binutils,gdb,unzip,p7zip,sqlite"
  MINIMAL_PACKAGES: "git,curl,wget,nano,tmux,htop,jq,ca-certificates,openssl-tool,openssh,screen,pacman"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      
      - name: Cache termux-packages build
        uses: actions/cache@v4
        with:
          path: |
            ~/.termux-build
            termux-packages/build
            termux-packages/output
          key: termux-${{ env.ARCHITECTURE }}-${{ github.run_number }}
          restore-keys: termux-${{ env.ARCHITECTURE }}-
      
      - name: Set package name
        run: echo "TERMUX_APP__PACKAGE_NAME=--name ${{ github.event.inputs.package_name }}" >> $GITHUB_ENV
      
      - name: Set packages (full or minimal)
        id: bootstrap_type
        run: |
          if [ "${{ github.event.inputs.minimal_bootstrap }}" = "true" ]; then
            echo "ADDITIONAL_PACKAGES=--add $MINIMAL_PACKAGES" >> $GITHUB_ENV
            echo "BOOTSTRAP_TYPE=minimal" >> $GITHUB_OUTPUT
          else
            echo "ADDITIONAL_PACKAGES=--add $FULL_PACKAGES" >> $GITHUB_ENV
            echo "BOOTSTRAP_TYPE=full" >> $GITHUB_OUTPUT
          fi
      
      - name: Set SSH server
        if: "${{ github.event.inputs.ssh_server == 'true' }}"
        run: echo "ENABLE_SSH=--enable-ssh-server" >> $GITHUB_ENV
      
      - name: Build Bootstrap
        run: |
          ./build-termux.sh \
            $TERMUX_APP__PACKAGE_NAME \
            --architectures $ARCHITECTURE \
            --type $TERMUX_TYPE \
            $ADDITIONAL_PACKAGES \
            $ENABLE_SSH \
            --disable-terminal \
            --disable-tasker \
            --disable-float \
            --disable-widget \
            --disable-api \
            --disable-boot \
            --disable-styling \
            --disable-gui \
            --disable-x11
      
      - name: List all built files
        run: |
          echo "=== Files in root directory ==="
          ls -lah *.apk *.zip 2>/dev/null || echo "No apk/zip in root"
          echo ""
          echo "=== Searching for bootstrap zips recursively ==="
          find . -maxdepth 3 -name "bootstrap-*.zip" -type f 2>/dev/null || echo "No bootstrap zips found"
          echo ""
          echo "=== All zip files ==="
          find . -maxdepth 3 -name "*.zip" -type f 2>/dev/null || echo "No zips found"
      
      - name: Check bootstrap generation
        run: |
          echo "Checking for bootstrap ZIPs..."
          if ! find . -maxdepth 3 -name "bootstrap-*.zip" 2>/dev/null | grep -q .; then
            echo "❌ ERROR: No bootstrap files generated!"
            echo "Available files:"
            find . -maxdepth 3 -type f \( -name "*.zip" -o -name "*.apk" \)
            exit 1
          fi
          echo "✅ Bootstrap files found!"
          find . -maxdepth 3 -name "bootstrap-*.zip" -exec ls -lah {} \;
      
      - name: Verify no com.termux references
        run: |
          for z in $(find . -maxdepth 3 -name "bootstrap-*.zip"); do
            [ -f "$z" ] || continue
            echo "Checking: $z"
            mkdir -p verify_$$
            unzip -q "$z" -d verify_$$
            if grep -r "com\.termux" verify_$$/ 2>/dev/null; then
              echo "❌ FAILED: Found com.termux references in $z!"
              rm -rf verify_$$
              exit 1
            fi
            echo "✅ Clean: $z"
            rm -rf verify_$$
          done
      
      - name: Prepare artifacts for release
        run: |
          mkdir -p release-artifacts
          
          # Move bootstraps from wherever they are to release-artifacts
          find . -maxdepth 3 -name "bootstrap-*.zip" -exec cp {} release-artifacts/ \;
          
          # Also include any APKs (for completeness)
          find . -maxdepth 3 -name "*.apk" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          
          echo "=== Final release artifacts ==="
          ls -lah release-artifacts/
          
          if [ -z "$(ls -A release-artifacts/)" ]; then
            echo "❌ ERROR: No artifacts to release!"
            exit 1
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.package_name }}-${{ steps.bootstrap_type.outputs.BOOTSTRAP_TYPE }}
          path: release-artifacts/*
          retention-days: 90
          if-no-files-found: error
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.event.inputs.package_name }}
          name: Bootstrap ${{ github.event.inputs.package_name }} (${{ steps.bootstrap_type.outputs.BOOTSTRAP_TYPE }})
          files: release-artifacts/*
          body: |
            ## Bootstrap for `${{ github.event.inputs.package_name }}`
            
            | Setting | Value |
            |---------|-------|
            | Package | `${{ github.event.inputs.package_name }}` |
            | Arch | `${{ env.ARCHITECTURE }}` |
            | Type | `${{ steps.bootstrap_type.outputs.BOOTSTRAP_TYPE }}` |
            | SSH Server | `${{ github.event.inputs.ssh_server }}` |
            
            **Extract to:** `/data/data/${{ github.event.inputs.package_name }}/files/`
            
            **Build Info:**
            - Run #${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
